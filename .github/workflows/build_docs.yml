name: Build PR Docs

on:
  workflow_call:
    inputs:
      main-repo:
        required: true
        type: string
        description: 'The main code repository (e.g. napari/napari or napari/docs)'
      main-ref:
        required: true
        type: string
        description: 'The ref (branch/sha) to use for the main repo (e.g. PR branch or main)'
      docs-repo:
        required: true
        type: string
        description: 'The docs repository (e.g. napari/docs)'
      docs-ref:
        required: true
        type: string
        description: 'The ref (branch/sha) to use for the docs repo (e.g. PR branch or main)'
      make_target:
        description: "Enter make target: html html-noplot docs slimfast slimgallery"
        type: string
        default: "slimfast"
      python_version:
        description: "Python version used for build docs"
        type: string
        default: "3.12"
    secrets:
      GOOGLE_CALENDAR_ID:
        required: false
      GOOGLE_CALENDAR_API_KEY:
        required: false
  workflow_dispatch:

permissions: {}

jobs:
  build-and-upload:
    name: Build & Upload Docs Artifact
    runs-on: ubuntu-latest
    env:
      XDG_CACHE_HOME: ${{ github.workspace }}/.cache
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.docs-repo }}
          ref: ${{ inputs.docs-ref }}
          path: docs
          persist-credentials: false
          fetch-depth: 0
      - name: Checkout main repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ inputs.main-repo }}
          ref: ${{ inputs.main-ref }}
          path: napari
          fetch-depth: 0
          persist-credentials: false
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "latest"
          python-version: ${{ inputs.python_version }}
          activate-environment: true
      - name: Cache pooch downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ${{ github.workspace }}/.cache/scikit-image
            ${{ github.workspace }}/.cache/napari-*
            ${{ github.workspace }}/.cache/pooch
          key: pooch
      - name: Setup headless display
        uses: pyvista/setup-headless-display-action@5bc8de3bc71fcda7a96439571287a554901541a0 # v4.3
        with:
          qt: true
          wm: herbstluftwm
      - name: Install dependencies
        run: |
          uv pip install --upgrade pip
          uv pip install "napari/[pyqt5]" --group napari/pyproject.toml:docs
        env:
          UV_CONSTRAINT: ${{ github.workspace }}/napari/resources/constraints/constraints_py${{ inputs.python_version }}_docs.txt
      - name: Test import
        run: |
          python -c 'import napari; print(napari.__version__)'
          python -c 'import napari.layers; print(napari.layers.__doc__)'
      - name: Build docs
        run: make -C docs "${MAKE_TARGET}"
        env:
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          GOOGLE_CALENDAR_API_KEY: ${{ secrets.GOOGLE_CALENDAR_API_KEY }}
          PIP_CONSTRAINT: ${{ github.workspace }}/napari/resources/constraints/constraints_py${{ inputs.python_version }}_docs.txt
          UV_CONSTRAINT: ${{ github.workspace }}/napari/resources/constraints/constraints_py${{ inputs.python_version }}_docs.txt
          MAKE_TARGET: ${{ inputs.make_target }}
      - name: Upload artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: html
          path: docs/docs/_build/html
